<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎬 CineQuiz Pro 300 - Fast Mode</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #03040a; --panel: #0a0c1a; --gold: #ffcc00; --gold-glow: rgba(255, 204, 0, 0.4);
  --blue: #00a8ff; --red: #ff4757; --green: #2ed573; --text: #f0f0f0; --dim: #57606f;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; min-height: 100vh; overflow-x: hidden; }

.progress-container { width: 100%; height: 4px; background: #111; position: sticky; top: 0; z-index: 1000; }
.progress-bar { height: 100%; width: 0%; background: var(--gold); box-shadow: 0 0 8px var(--gold); transition: 0.5s; }

header { text-align: center; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #000; }
h1 { font-family: 'Bebas Neue'; font-size: 1.8rem; color: var(--gold); }
.round-counter { font-family: 'Space Mono'; color: var(--gold); font-size: 1.1rem; }

.info-area { max-width: 850px; margin: 10px auto; padding: 0 10px; }
.intro-box { background: var(--panel); border: 1px solid var(--gold); border-radius: 8px; padding: 12px; font-style: italic; font-size: 0.9rem; text-align: center; color: #eee; margin-bottom: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
.fact-display-box { 
    background: rgba(0, 168, 255, 0.15); border: 1px solid var(--blue); border-left: 5px solid var(--blue); 
    padding: 15px; border-radius: 6px; min-height: 60px; display: flex; align-items: center; 
    justify-content: center; font-weight: bold; font-size: 1.1rem; color: #fff; opacity: 0; transition: 0.3s;
}
.fact-display-box.show { opacity: 1; }

.game-stats { display: flex; justify-content: center; gap: 40px; margin: 10px 0; font-family: 'Space Mono'; }
.stat-item { text-align: center; }
.stat-label { font-size: 0.6rem; color: var(--dim); text-transform: uppercase; display: block; }
.stat-val { font-size: 2rem; color: var(--gold); font-weight: bold; }

.title-cells { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin: 20px 0; padding: 0 10px; }
.tcell-input { 
    width: 34px; height: 42px; background: #111; border: 1px solid var(--dim); 
    border-bottom: 4px solid var(--gold); text-align: center; font-family: 'Bebas Neue'; 
    font-size: 1.8rem; color: var(--gold); border-radius: 4px; outline: none; transition: 0.2s;
}
.tcell-input.correct { border-color: var(--green) !important; background: rgba(46, 213, 115, 0.2); }
.tcell-input.wrong { border-color: var(--red) !important; background: rgba(255, 71, 87, 0.2); color: var(--red); }

.cards-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 850px; margin: 20px auto; padding: 0 10px; }
.card { aspect-ratio: 3/4; perspective: 1000px; }
.card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
.card.flipped .card-inner { transform: rotateY(180deg); }
.card-back, .card-front { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.05); }
.card-back { background: #101326; color: var(--gold); cursor: pointer; }
.card-front { background: #081226; transform: rotateY(180deg); border-color: var(--gold); padding: 5px; text-align: center; }

.btn-skip { background: transparent; border: 2px solid var(--red); color: var(--red); padding: 12px 30px; font-family: 'Bebas Neue'; font-size: 1.2rem; cursor: pointer; border-radius: 5px; display: block; margin: 30px auto; }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
.overlay.show { display: flex; }
.modal { background: var(--panel); padding: 30px; border: 2px solid var(--gold); border-radius: 15px; text-align: center; width: 100%; max-width: 550px; }

.stats-table { width: 100%; margin: 20px 0; border-collapse: collapse; font-size: 0.85rem; }
.stats-table th, .stats-table td { border: 1px solid var(--dim); padding: 10px; text-align: left; }
.stats-table th { color: var(--gold); font-family: 'Bebas Neue'; }

#yt-player { position: absolute; left: -9999px; }
@media (max-width: 600px) { .cards-grid { grid-template-columns: repeat(3, 1fr); } .tcell-input { width: 28px; height: 38px; font-size: 1.5rem; } }
</style>
</head>
<body>

<div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
<div id="yt-player"></div>

<header>
  <h1>CINEQUIZ PRO</h1>
  <div class="round-counter"><span id="currRound">1</span> / 15</div>
</header>

<div class="info-area">
    <div class="intro-box" id="introText">Film ma'lumotlari yuklanmoqda...</div>
    <div class="fact-display-box" id="factDisplay">Kino haqida fakt olish uchun kartalardan birini bosing!</div>
</div>

<div class="game-stats">
  <div class="stat-item"><span class="stat-label">ROUND</span><span class="stat-val" id="roundScore">15</span></div>
  <div class="stat-item"><span class="stat-label">JAMI</span><span class="stat-val" id="totalScore">0</span></div>
</div>

<div class="title-cells" id="titleGrid"></div>
<div class="cards-grid" id="cardsGrid"></div>

<button class="btn-skip" onclick="skipRound()">BILMAYMAN / SKIP</button>

<div class="overlay" id="resultModal">
  <div class="modal">
    <h2 id="rTitle" style="font-family:'Bebas Neue'; font-size:3rem;"></h2>
    <p id="rFilm" style="color:var(--gold); font-size:1.8rem; font-weight:bold; margin:15px 0;"></p>
    <button onclick="nextRound()" style="background:var(--gold); padding:15px 40px; border:none; font-family:'Bebas Neue'; font-size:1.5rem; cursor:pointer; border-radius:5px;">KEYINGI FILM →</button>
  </div>
</div>

<div class="overlay" id="finalModal">
  <div class="modal">
    <h2 style="font-family:'Bebas Neue'; font-size:2.5rem; color:var(--gold);">O'YIN YAKUNLANDI!</h2>
    <div style="font-size:4.5rem; font-weight:bold; margin:10px 0;" id="fTotal">0</div>
    <p id="fRating" style="font-style:italic; margin-bottom:20px;"></p>
    <div style="max-height: 250px; overflow-y: auto;">
        <table class="stats-table" id="statsTable">
          <thead><tr><th>#</th><th>Film</th><th>Ball</th></tr></thead>
          <tbody></tbody>
        </table>
    </div>
    <button onclick="location.reload()" style="background:var(--gold); padding:15px 40px; border:none; font-family:'Bebas Neue'; font-size:1.5rem; cursor:pointer; border-radius:5px; margin-top:20px;">QAYTADAN BOSHLASH</button>
  </div>
</div>

<script>
const TRACKS = ["I0cZukTFXNw", "nj4mXWKgKXc", "8kooIgKESYE", "X-jdl9hcCeg"];
const ICONS = {"YIL":"📅","REJISSYOR":"🎬","AKTYOR":"🎭","JANR":"🌀","SAHNA":"🎞️","IQTIBOS":"💬","MUSIQA":"🎵","MUKOFOT":"🏆","DETAL":"🧩","HARF":"🔤","INFO":"ℹ️"};

let allMovies = [], currentIndex = 0, roundScore = 15, totalScore = 0;
let spunIndices = [], revealedLetters = new Set(), currentMovie = null, gameLog = [];

let tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, null);
function onYouTubeIframeAPIReady() {
  const track = TRACKS[Math.floor(Math.random()*TRACKS.length)];
  new YT.Player('yt-player', { height:'0', width:'0', videoId:track, playerVars:{'autoplay':1,'loop':1,'playlist':track}, events:{'onReady':(e)=>e.target.setVolume(15)}});
}

async function init() {
  try {
    const res = await fetch('films.json');
    const data = await res.json();
    allMovies = data.sort(()=>Math.random()-0.5).slice(0, 15);
    startRound();
  } catch(e) { console.log("JSON yuklashda xato"); }
}

function startRound() {
  currentMovie = allMovies[currentIndex]; roundScore = 15; spunIndices = []; revealedLetters.clear();
  document.getElementById('currRound').innerText = currentIndex + 1;
  document.getElementById('roundScore').innerText = "15";
  document.getElementById('introText').innerText = currentMovie.intro;
  document.getElementById('factDisplay').classList.remove('show');
  document.getElementById('progressBar').style.width = (currentIndex / 15 * 100) + "%";
  renderCards(); renderTitle();
}

function renderCards() {
  const g = document.getElementById('cardsGrid'); g.innerHTML = "";
  for(let i=0; i<15; i++) {
    const fact = currentMovie.facts[i];
    const type = (fact.match(/\[(.*?)\]/)?.[1]||"INFO").toUpperCase();
    const icon = ICONS[type] || ICONS["INFO"];
    g.innerHTML += `
      <div class="card" id="card-${i}" onclick="showClue(${i})">
        <div class="card-inner">
          <div class="card-back">
            <span style="font-size:1.8rem">${icon}</span>
            <span style="font-size:0.6rem; text-transform:uppercase; margin-top:5px; color:var(--dim); font-weight:bold;">${type}</span>
          </div>
          <div class="card-front" id="f-${i}"></div>
        </div>
      </div>`;
  }
}

function showClue(idx) {
  if(spunIndices.includes(idx) || roundScore <= 1) return;
  spunIndices.push(idx);
  const f = currentMovie.facts[idx], type = (f.match(/\[(.*?)\]/)?.[1]||"INFO").toUpperCase(), txt = f.replace(/\[.*?\]/,"").trim();
  const icon = ICONS[type] || ICONS["INFO"];
  const cleanTxt = txt.split(' (')[0];

  document.getElementById(`f-${idx}`).innerHTML = `<div style="color:var(--gold); font-size:0.6rem; font-weight:bold;">${type}</div>`;
  document.getElementById(`card-${idx}`).classList.add('flipped');

  const display = document.getElementById('factDisplay');
  display.innerHTML = `<span style="margin-right:10px">${icon}</span> <b>${type}:</b> ${cleanTxt}`;
  display.classList.add('show');

  if(type === "HARF") {
    const m = f.match(/reveal:\s*(\d+)/); 
    if(m) {
      const pos = parseInt(m[1]);
      revealedLetters.add(pos);
      const input = document.getElementById(`input-${pos}`);
      if(input) {
        input.value = currentMovie.title.split(' (')[0][pos].toUpperCase();
        input.classList.remove('wrong');
        input.classList.add('correct');
        input.disabled = true;
      }
    }
  }
  roundScore--; document.getElementById('roundScore').innerText = roundScore;
  checkWin();
}

function renderTitle() {
  const g = document.getElementById('titleGrid'); g.innerHTML = "";
  const titleStr = currentMovie.title.split(' (')[0].toUpperCase();
  [...titleStr].forEach((char, i) => {
    if(!/[A-Z0-9]/.test(char)) {
      const spacer = document.createElement('div');
      spacer.style.width = char === " " ? "15px" : "10px";
      spacer.innerText = char === " " ? "" : char;
      spacer.style.display = "flex"; spacer.style.alignItems = "center";
      g.appendChild(spacer);
    } else {
      const input = document.createElement('input');
      input.className = 'tcell-input'; input.maxLength = 1; input.id = `input-${i}`;
      if(revealedLetters.has(i)) { input.value = char; input.disabled = true; input.classList.add('correct'); }
      input.addEventListener('input', (e) => {
        const val = e.target.value.toUpperCase();
        e.target.classList.remove('wrong', 'correct');
        if(val === char) { e.target.classList.add('correct'); focusNext(i); }
        else if(val !== "") { e.target.classList.add('wrong'); }
        checkWin();
      });
      input.addEventListener('keydown', (e) => { if(e.key === 'Backspace' && !e.target.value) focusPrev(i); });
      g.appendChild(input);
    }
  });
}

function focusNext(idx) { for(let i=idx+1; i<100; i++) { const el=document.getElementById(`input-${i}`); if(el&&!el.disabled){el.focus(); break;} } }
function focusPrev(idx) { for(let i=idx-1; i>=0; i--) { const el=document.getElementById(`input-${i}`); if(el&&!el.disabled){el.focus(); break;} } }

function checkWin() {
  const titleStr = currentMovie.title.split(' (')[0].toUpperCase();
  const isComplete = [...titleStr].every((char, i) => {
    if(!/[A-Z0-9]/.test(char)) return true;
    const input = document.getElementById(`input-${i}`);
    return input && input.value.toUpperCase() === char;
  });
  if(isComplete) setTimeout(() => endRound(true), 300);
}

function skipRound() { endRound(false); }

function endRound(win) {
  const score = win ? roundScore : 0;
  totalScore += score;
  gameLog.push({ title: currentMovie.title, score });
  document.getElementById('rTitle').innerText = win ? "TO'G'RI!" : "AFSUS!";
  document.getElementById('rTitle').style.color = win ? "var(--green)" : "var(--red)";
  document.getElementById('rFilm').innerText = currentMovie.title;
  document.getElementById('resultModal').classList.add('show');
}

function nextRound() {
  document.getElementById('resultModal').classList.remove('show');
  currentIndex++;
  if(currentIndex < 15) startRound(); else showFinal();
}

function showFinal() {
  document.getElementById('fTotal').innerText = totalScore;
  const rating = totalScore >= 140 ? "Siz Holywoodda Tarantino darajasidasiz! 🏆" : (totalScore >= 100 ? "Haqiqiy kinoman ekansiz! 🥇" : (totalScore >= 60 ? "Yaxshi natija! 🥈" : "Faqat novella ko'rasiz shekilli? 😅"));
  document.getElementById('fRating').innerText = rating;
  const tbody = document.querySelector('#statsTable tbody');
  tbody.innerHTML = "";
  gameLog.forEach((item, idx) => { tbody.innerHTML += `<tr><td>${idx+1}</td><td>${item.title}</td><td>${item.score}</td></tr>`; });
  document.getElementById('finalModal').classList.add('show');
}

init();
</script>
</body>
</html>
