<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 CineLatatron 300 Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #05060a;
  --panel: #0d0f1d;
  --card-bg: #15192d;
  --card-face: #0a1830;
  --gold: #ffcc33;
  --gold-glow: rgba(255, 204, 51, 0.4);
  --red: #e74c3c;
  --text: #f0e6d2;
  --dim: #636e72;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Pro', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Film lentasi effektli header */
header {
  background: linear-gradient(to bottom, #111, var(--bg));
  padding: 40px 20px 20px;
  text-align: center;
  border-bottom: 1px solid rgba(255, 204, 51, 0.2);
}

h1 {
  font-family: 'Bebas Neue', cursive;
  font-size: clamp(3rem, 10vw, 6rem);
  color: var(--gold);
  text-shadow: 0 0 20px var(--gold-glow);
  letter-spacing: 5px;
}

.intro-box {
  max-width: 700px;
  margin: 20px auto;
  background: var(--panel);
  border: 1px solid var(--gold);
  padding: 20px;
  border-radius: 8px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  position: relative;
}

.intro-box::before {
  content: "SPOILER / TA'RIF";
  position: absolute;
  top: -10px; left: 20px;
  background: var(--gold);
  color: #000;
  font-family: 'Space Mono';
  font-size: 0.7rem;
  padding: 2px 10px;
  font-weight: bold;
}

.game-stats {
  display: flex;
  justify-content: space-around;
  max-width: 700px;
  margin: 0 auto 20px;
  font-family: 'Space Mono';
}

.stat-item span { display: block; text-align: center; }
.stat-label { color: var(--dim); font-size: 0.7rem; }
.stat-value { color: var(--gold); font-size: 2rem; font-weight: bold; }

/* Latatron / Drum */
.drum-area { text-align: center; margin-bottom: 30px; }
.drum {
  width: 100px; height: 100px;
  margin: 0 auto 15px;
  border-radius: 50%;
  border: 4px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-size: 2.5rem;
  background: radial-gradient(circle, #1e272e, #05060a);
  box-shadow: 0 0 25px var(--gold-glow);
}
.drum.spinning { animation: spinAnim 1s infinite linear; }
@keyframes spinAnim { 100% { transform: rotate(360deg); } }

.btn {
  font-family: 'Bebas Neue';
  font-size: 1.5rem;
  padding: 12px 40px;
  background: var(--gold);
  color: #000;
  border: none;
  cursor: pointer;
  border-radius: 4px;
  transition: 0.3s;
}
.btn:hover:not(:disabled) { transform: scale(1.05); filter: brightness(1.1); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Kartalar Grid */
.cards-container {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  max-width: 700px;
  margin: 0 auto 30px;
  padding: 0 15px;
}

.card { aspect-ratio: 3/4; perspective: 1000px; cursor: pointer; }
.card-inner {
  position: relative; width: 100%; height: 100%;
  transition: transform 0.6s; transform-style: preserve-3d;
}
.card.flipped .card-inner { transform: rotateY(180deg); }

.card-front, .card-back {
  position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(255,255,255,0.1);
}

.card-back { background: var(--card-bg); color: var(--dim); font-family: 'Space Mono'; }
.card-front {
  background: var(--card-face); transform: rotateY(180deg);
  flex-direction: column; padding: 10px; text-align: center;
  border-color: var(--gold);
}

.clue-tag { font-family: 'Space Mono'; font-size: 0.5rem; color: var(--gold); margin-bottom: 5px; }
.clue-text { font-size: 0.65rem; line-height: 1.2; }

/* Harf katakchalari */
.title-display {
  display: flex; flex-wrap: wrap; justify-content: center;
  gap: 8px; margin-bottom: 30px;
}
.letter-box {
  width: 35px; height: 45px;
  border-bottom: 3px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue'; font-size: 1.8rem;
  color: transparent; transition: 0.4s;
}
.letter-box.visible { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

/* Guess area */
.guess-area { text-align: center; margin-bottom: 50px; }
.guess-input {
  background: #111; border: 1px solid var(--dim);
  color: #fff; padding: 12px; width: 250px;
  border-radius: 4px; font-family: 'Space Mono';
}

/* Modal */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.95);
  display: none; align-items: center; justify-content: center; z-index: 1000;
}
.modal {
  background: var(--panel); padding: 40px; border: 1px solid var(--gold);
  border-radius: 12px; text-align: center; max-width: 500px;
}

@media (max-width: 500px) {
  .cards-container { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<header>
  <h1>CINELATATRON</h1>
  <p class="subtitle">300 ta afsonaviy film bazasi</p>
</header>

<div class="intro-box" id="introText">Filmlar yuklanmoqda...</div>

<div class="game-stats">
  <div class="stat-item"><span class="stat-label">ROUND BALL</span><span class="stat-value" id="roundScore">15</span></div>
  <div class="stat-item"><span class="stat-label">JAMI BALL</span><span class="stat-value" id="totalScore">0</span></div>
</div>

<div class="drum-area">
  <div class="drum" id="drum">🎲</div>
  <button class="btn" id="spinBtn" onclick="spin()">🎰 AYLANTIRISH</button>
</div>

<div class="cards-container" id="cardsGrid"></div>

<div class="title-display" id="titleGrid"></div>

<div class="guess-area">
  <input type="text" id="guessInput" class="guess-input" placeholder="Film nomi..." autocomplete="off">
  <button class="btn" style="padding: 12px 25px;" onclick="checkGuess()">OK</button>
</div>

<div class="overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle" style="font-family: 'Bebas Neue'; font-size: 3rem;">BARAKALLA!</h2>
    <p id="modalFilm" style="color: var(--gold); font-size: 1.5rem; margin: 15px 0;"></p>
    <button class="btn" onclick="nextRound()">KEYINGI FILM →</button>
  </div>
</div>

<script>
let movies = [];
let currentIndex = 0;
let roundScore = 15;
let totalScore = 0;
let spunIndices = [];
let revealedLetters = new Set();
let isSpinning = false;
let currentMovie = null;

// 1. JSON yuklash
async function init() {
    try {
        const res = await fetch('films.json');
        movies = await res.json();
        // Tasodifiy tartiblash
        movies = movies.sort(() => Math.random() - 0.5);
        startRound();
    } catch (e) {
        document.getElementById('introText').innerText = "XATO: films.json fayli topilmadi!";
    }
}

function startRound() {
    currentMovie = movies[currentIndex];
    roundScore = 15;
    spunIndices = [];
    revealedLetters.clear();
    
    document.getElementById('roundScore').innerText = "15";
    document.getElementById('introText').innerText = currentMovie.intro;
    document.getElementById('guessInput').value = "";
    document.getElementById('spinBtn').disabled = false;
    
    renderCards();
    renderTitle();
}

function renderCards() {
    const grid = document.getElementById('cardsGrid');
    grid.innerHTML = "";
    for (let i = 0; i < 15; i++) {
        grid.innerHTML += `
            <div class="card" id="card-${i}">
                <div class="card-inner">
                    <div class="card-back">${i + 1}</div>
                    <div class="card-front" id="front-${i}"></div>
                </div>
            </div>`;
    }
}

function renderTitle() {
    const grid = document.getElementById('titleGrid');
    grid.innerHTML = "";
    const cleanTitle = currentMovie.title.split(' (')[0].toUpperCase();
    
    [...cleanTitle].forEach((char, idx) => {
        if (char === " ") {
            grid.innerHTML += `<div style="width: 20px;"></div>`;
        } else {
            const isVisible = revealedLetters.has(idx) ? "visible" : "";
            grid.innerHTML += `<div class="letter-box ${isVisible}">${char}</div>`;
        }
    });
}

function spin() {
    if (isSpinning || roundScore <= 1) return;
    isSpinning = true;
    document.getElementById('spinBtn').disabled = true;
    const drum = document.getElementById('drum');
    drum.classList.add('spinning');

    setTimeout(() => {
        drum.classList.remove('spinning');
        
        let pick;
        do { pick = Math.floor(Math.random() * 15); } while (spunIndices.includes(pick));
        
        spunIndices.push(pick);
        const fact = currentMovie.facts[pick];
        const type = fact.match(/\[(.*?)\]/)?.[1] || "MA'LUMOT";
        const text = fact.replace(/\[.*?\]/, "").trim();

        // Kartani yangilash
        const front = document.getElementById(`front-${pick}`);
        front.innerHTML = `<div class="clue-tag">${type}</div><div class="clue-text">${text}</div>`;
        document.getElementById(`card-${pick}`).classList.add('flipped');

        // Harf bo'lsa ochish
        if (type === "HARF") {
            const match = fact.match(/reveal:\s*(\d+)/);
            if (match) revealedLetters.add(parseInt(match[1]));
            renderTitle();
        }

        roundScore--;
        document.getElementById('roundScore').innerText = roundScore;
        isSpinning = false;
        document.getElementById('spinBtn').disabled = false;
    }, 1000);
}

function checkGuess() {
    const val = document.getElementById('guessInput').value.trim().toUpperCase();
    const target = currentMovie.title.split(' (')[0].toUpperCase();
    
    if (val === target) {
        totalScore += roundScore;
        document.getElementById('totalScore').innerText = totalScore;
        document.getElementById('modalFilm').innerText = currentMovie.title;
        document.getElementById('modal').style.display = "flex";
    } else {
        alert("Noto'g'ri! Yana bir bor urinib ko'ring.");
    }
}

function nextRound() {
    document.getElementById('modal').style.display = "none";
    currentIndex++;
    if (currentIndex < movies.length) startRound(); else alert("TUGADI! JAMI BALL: " + totalScore);
}

init();
</script>
</body>
</html>
