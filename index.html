<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎬 CineQuiz Pro 300</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #03040a; --panel: #0a0c1a; --card-bg: #101326; --card-face: #081226;
  --gold: #ffcc00; --gold-glow: rgba(255, 204, 0, 0.4); --blue: #00a8ff;
  --red: #e74c3c; --text: #f0f0f0; --dim: #57606f;
}

* { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }

body {
  background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif;
  min-height: 100vh; overflow-x: hidden;
  background-image: radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 2px);
  background-size: 50px 50px; animation: stars 10s linear infinite;
}

@keyframes stars { from { background-position: 0 0; } to { background-position: 0 -50px; } }

header { text-align: center; padding: 25px 10px; border-bottom: 2px solid var(--gold); box-shadow: 0 0 20px var(--gold-glow); }
h1 { font-family: 'Bebas Neue'; font-size: 3.5rem; letter-spacing: 4px; color: var(--gold); }

.intro-container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
.intro-box { background: var(--panel); border: 1px solid var(--gold); border-radius: 8px; padding: 20px; position: relative; }
.intro-box::before { content: "SPOILER / TA'RIF"; position: absolute; top: -10px; left: 20px; background: var(--gold); color: #000; font-size: 0.7rem; padding: 2px 8px; font-weight: bold; border-radius: 4px; }
.intro-text { font-size: 0.95rem; line-height: 1.5; font-style: italic; color: #d1ccc0; }

.game-stats { display: flex; justify-content: center; gap: 40px; margin: 15px 0; }
.stat-label { font-size: 0.7rem; color: var(--dim); text-transform: uppercase; display: block; }
.stat-value { font-family: 'Space Mono'; font-size: 2.2rem; color: var(--gold); font-weight: bold; }

.wheel-container { display: flex; justify-content: center; margin-bottom: 25px; position: relative; }
.wheel-wrap { width: 260px; height: 260px; position: relative; border-radius: 50%; border: 8px solid var(--panel); box-shadow: 0 0 25px var(--gold-glow); cursor: grab; }
#wheel { width: 100%; height: 100%; border-radius: 50%; }
.wheel-marker { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 2rem; z-index: 10; }

.fact-display { max-width: 800px; margin: 0 auto 20px; padding: 0 15px; }
.fact-box { background: rgba(0, 168, 255, 0.1); border: 1px solid var(--blue); border-left: 5px solid var(--blue); padding: 15px; opacity: 0; transition: 0.4s; border-radius: 4px; }
.fact-box.show { opacity: 1; }

.title-cells { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin: 20px 0; }
.tcell { width: 30px; height: 40px; border-bottom: 3px solid var(--gold); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue'; font-size: 1.8rem; color: transparent; transition: 0.4s; }
.tcell.visible { color: var(--gold); text-shadow: 0 0 8px var(--gold); }

.cards-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 800px; margin: 20px auto; padding: 0 15px; }
.card { aspect-ratio: 3/4; perspective: 1000px; }
.card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
.card.flipped .card-inner { transform: rotateY(180deg); }
.card-back, .card-front { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); }
.card-back { background: var(--card-bg); color: var(--dim); font-family: 'Space Mono'; font-size: 1.2rem; }
.card-front { background: var(--card-face); transform: rotateY(180deg); border-color: var(--gold); padding: 5px; text-align: center; }

.action-area { max-width: 800px; margin: 30px auto 60px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
.guess-input { background: var(--panel); border: 1px solid var(--dim); color: #fff; padding: 15px; width: 320px; border-radius: 6px; text-align: center; font-size: 1rem; }
.btn-group { display: flex; gap: 15px; }
.btn { font-family: 'Bebas Neue'; font-size: 1.4rem; padding: 12px 35px; border-radius: 5px; cursor: pointer; border: none; transition: 0.3s; }
.btn-gold { background: var(--gold); color: #000; }
.btn-skip { background: transparent; color: var(--red); border: 2px solid var(--red); }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.96); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
.overlay.show { display: flex; }
.modal { background: var(--panel); padding: 40px; border: 2px solid var(--gold); border-radius: 15px; text-align: center; width: 100%; max-width: 500px; }
.modal-title { font-family: 'Bebas Neue'; font-size: 3rem; }
.modal-film { color: var(--gold); font-size: 1.6rem; margin: 15px 0; font-weight: bold; }

@media (max-width: 600px) { .cards-grid { grid-template-columns: repeat(3, 1fr); } h1 { font-size: 2.5rem; } }
</style>
</head>
<body>

<header><h1>CINEQUIZ PRO 300</h1></header>

<div class="intro-container">
  <div class="intro-box"><p class="intro-text" id="introText">Yuklanmoqda...</p></div>
</div>

<div class="game-stats">
  <div class="stat"><span class="stat-label">ROUND SCORE</span><span class="stat-value" id="roundScore">15</span></div>
  <div class="stat"><span class="stat-label">TOTAL SCORE</span><span class="stat-value" id="totalScore">0</span></div>
</div>

<div class="wheel-container">
  <div class="wheel-marker">▼</div>
  <div class="wheel-wrap" id="wheelWrap"><canvas id="wheel"></canvas></div>
</div>

<div class="fact-display">
  <div class="fact-box" id="factBox"><p id="factText" style="font-weight: bold;"></p></div>
</div>

<div class="title-container">
  <div class="title-cells" id="titleGrid"></div>
</div>

<div class="cards-grid" id="cardsGrid"></div>

<div class="action-area">
  <input type="text" id="guessInput" class="guess-input" placeholder="Film nomi..." autocomplete="off">
  <div class="btn-group">
    <button class="btn btn-gold" onclick="checkGuess()">TEKSHIRISH</button>
    <button class="btn btn-skip" onclick="skipRound()">BILMAYMAN</button>
  </div>
</div>

<div class="overlay" id="resultModal">
  <div class="modal">
    <h2 class="modal-title" id="rTitle"></h2>
    <p class="modal-film" id="rFilm"></p>
    <p id="rIntro" style="font-style: italic; margin-bottom: 25px; color: #ccc;"></p>
    <button class="btn btn-gold" onclick="nextRound()">KEYINGI FILM →</button>
  </div>
</div>

<div class="overlay" id="finalModal">
  <div class="modal">
    <h2 class="modal-title">O'YIN TUGADI!</h2>
    <p style="font-size: 4rem; color: var(--gold); font-weight: bold; margin: 10px 0;" id="fTotal">0</p>
    <p id="fRating" style="font-style: italic; margin-bottom: 30px; line-height: 1.5;"></p>
    <button class="btn btn-gold" onclick="location.reload()">QAYTADAN BOSHLASH</button>
  </div>
</div>

<script>
const ICONS = {"YIL":"📅","REJISSYOR":"🎬","AKTYOR":"🎭","JANR":"🌀","SAHNA":"🎞️","IQTIBOS":"💬","MUSIQA":"🎵","MUKOFOT":"🏆","DETAL":"🧩","HARF":"🔤"};
const RATINGS = [
  { min: 140, msg: "Siz O'zbekistonda nima qilayapsiz, Holywoodda Tarantino kutayapti sizi!))" },
  { min: 110, msg: "Daxshat! Kino olami ensiklopediyasi ekansiz-ku!" },
  { min: 85, msg: "Juda yaxshi natija. Haqiqiy kinoman!" },
  { min: 65, msg: "Yomon emas. Ko'p filmlarni tanir ekansiz." },
  { min: 45, msg: "O'rtacha. Ba'zi klassikalarni ko'rish kerak." },
  { min: 30, msg: "Kino ko'rishni boshlash kerak, do'stim." },
  { min: 20, msg: "Televizorda faqat xabarlarni ko'rasizmi?" },
  { min: 10, msg: "Siz faqat televizorda novella ko'rsayiz kerak-a?" },
  { min: 1, msg: "Umuman qiziqmas ekansiz-a kinoga?" },
  { min: 0, msg: "Saytni adashib ochib qoldingizmi? 😅" }
];

let allMovies = [], currentIndex = 0, roundScore = 15, totalScore = 0;
let spunIndices = [], revealedLetters = new Set(), currentMovie = null;

// G'ildirak fizikasi
const canvas = document.getElementById('wheel'), ctx = canvas.getContext('2d'), wrap = document.getElementById('wheelWrap');
let size = 260, center = 130, angle = 0, speed = 0, isDragging = false, startX, startY, lastT;
canvas.width = size; canvas.height = size;

function drawWheel() {
  ctx.clearRect(0,0,size,size);
  let sector = (Math.PI*2)/15;
  for(let i=0; i<15; i++) {
    let a = angle + i*sector;
    ctx.beginPath(); ctx.moveTo(center,center);
    ctx.arc(center,center,center-5,a,a+sector);
    ctx.fillStyle = i%2===0 ? "#0d0f1d" : "#ffcc00"; ctx.fill();
    ctx.save(); ctx.translate(center,center); ctx.rotate(a+sector/2);
    ctx.fillStyle = i%2===0 ? "#ffcc00" : "#0d0f1d"; ctx.font = "bold 14px Space Mono";
    ctx.fillText(i+1, center-25, 5); ctx.restore();
  }
}

function physics(t) {
  let dt = (t-(lastT||t))/1000; lastT = t;
  if(!isDragging && speed!==0) {
    angle += speed*dt; speed *= Math.pow(0.98, dt*60);
    if(Math.abs(speed)<0.1) { speed=0; resolveSpin(); }
    drawWheel();
  }
  requestAnimationFrame(physics);
}

wrap.addEventListener('mousedown', e => { if(roundScore>1 && !isDragging) { isDragging=true; speed=0; startX=e.clientX; startY=e.clientY; }});
window.addEventListener('mousemove', e => {
  if(!isDragging) return;
  let rect = wrap.getBoundingClientRect(), cx = rect.left+130, cy = rect.top+130;
  let a1 = Math.atan2(startY-cy, startX-cx), a2 = Math.atan2(e.clientY-cy, e.clientX-cx);
  angle += (a2-a1); startX=e.clientX; startY=e.clientY; drawWheel();
});
window.addEventListener('mouseup', () => { if(isDragging) { isDragging=false; speed=25; }});

function resolveSpin() {
  let sector = (Math.PI*2)/15;
  let norm = (Math.PI*1.5 - angle) % (Math.PI*2); if(norm<0) norm += Math.PI*2;
  let pick = Math.floor(norm/sector); if(pick>=15) pick=0;
  if(spunIndices.includes(pick)) { angle += 0.1; resolveSpin(); return; }
  showClue(pick);
}

// O'yin mantiqi
async function init() {
  try {
    const res = await fetch('films.json');
    allMovies = (await res.json()).sort(() => Math.random()-0.5).slice(0,10);
    startRound(); requestAnimationFrame(physics);
  } catch(e) { document.getElementById('introText').innerText = "films.json yuklanmadi!"; }
}

function startRound() {
  currentMovie = allMovies[currentIndex]; roundScore = 15; spunIndices = []; revealedLetters.clear();
  document.getElementById('roundScore').innerText = "15";
  document.getElementById('introText').innerText = currentMovie.intro;
  document.getElementById('guessInput').value = "";
  document.getElementById('factBox').classList.remove('show');
  renderCards(); renderTitle(); drawWheel();
}

function renderCards() {
  const g = document.getElementById('cardsGrid'); g.innerHTML = "";
  for(let i=0; i<15; i++) g.innerHTML += `<div class="card" id="card-${i}"><div class="card-inner"><div class="card-back">${i+1}</div><div class="card-front" id="f-${i}"></div></div></div>`;
}

function renderTitle() {
  const g = document.getElementById('titleGrid'); g.innerHTML = "";
  const t = currentMovie.title.split(' (')[0].toUpperCase();
  [...t].forEach((c, i) => {
    if(c===" ") g.innerHTML += `<div style="width:15px"></div>`;
    else g.innerHTML += `<div class="tcell ${revealedLetters.has(i)?'visible':''}">${c}</div>`;
  });
}

function showClue(idx) {
  if(roundScore <= 1) return;
  spunIndices.push(idx);
  const f = currentMovie.facts[idx], type = f.match(/\[(.*?)\]/)?.[1]||"INFO", txt = f.replace(/\[.*?\]/,"").trim();
  const icon = ICONS[type] || "ℹ️";
  
  document.getElementById(`f-${idx}`).innerHTML = `<div style="font-size:0.5rem; color:var(--gold)">${type}</div><div style="font-size:0.6rem">${txt}</div>`;
  document.getElementById(`card-${idx}`).classList.add('flipped');
  document.getElementById('factText').innerHTML = `${icon} <b>${type}:</b> ${txt}`;
  document.getElementById('factBox').classList.add('show');

  if(type === "HARF") {
    const m = f.match(/reveal:\s*(\d+)/); if(m) revealedLetters.add(parseInt(m[1]));
    renderTitle();
  }
  roundScore--; document.getElementById('roundScore').innerText = roundScore;
}

function checkGuess() {
  const v = document.getElementById('guessInput').value.trim().toUpperCase();
  const t = currentMovie.title.split(' (')[0].toUpperCase();
  if(v === t) endRound(true); else alert("Noto'g'ri!");
}

function skipRound() { endRound(false); }

function endRound(win) {
  if(win) {
    totalScore += roundScore;
    document.getElementById('rTitle').innerText = "TO'G'RI!";
    document.getElementById('rTitle').style.color = "var(--gold)";
  } else {
    document.getElementById('rTitle').innerText = "0 BALL";
    document.getElementById('rTitle').style.color = "var(--red)";
    // Hamma narsani ochish
    for(let i=0; i<15; i++) {
        if(!spunIndices.includes(i)) {
            const f = currentMovie.facts[i], type = f.match(/\[(.*?)\]/)?.[1]||"INFO", txt = f.replace(/\[.*?\]/,"").trim();
            document.getElementById(`f-${i}`).innerHTML = `<div style="font-size:0.4rem; color:#888">${type}</div><div style="font-size:0.5rem">${txt}</div>`;
            document.getElementById(`card-${i}`).classList.add('flipped');
        }
    }
    const t = currentMovie.title.split(' (')[0].toUpperCase();
    for(let i=0; i<t.length; i++) revealedLetters.add(i);
    renderTitle();
  }
  document.getElementById('rFilm').innerText = currentMovie.title;
  document.getElementById('rIntro').innerText = currentMovie.intro;
  document.getElementById('resultModal').classList.add('show');
}

function nextRound() {
  document.getElementById('resultModal').classList.remove('show');
  currentIndex++;
  if(currentIndex < 10) startRound(); else showFinal();
}

function showFinal() {
  let r = RATINGS.find(x => totalScore >= x.min);
  document.getElementById('fTotal').innerText = totalScore;
  document.getElementById('fRating').innerText = r.msg;
  document.getElementById('finalModal').classList.add('show');
}

init();
</script>
</body>
</html>
